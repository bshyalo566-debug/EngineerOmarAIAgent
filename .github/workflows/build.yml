name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Unzip any zip file
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Unzipping $zip..."
              unzip -o "$zip" -d extracted
            fi
          done

      - name: Build Flutter APK
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "ERROR: Could not find pubspec.yaml anywhere in this repo!"
            echo "Files in repository:"
            ls -la
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Found pubspec.yaml at: $PUBSPEC_PATH"
          cd "$PROJECT_DIR"
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
